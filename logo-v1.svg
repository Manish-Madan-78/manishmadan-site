<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 72" fill="none" role="img" aria-label="Manish Madan logo">
  <defs>
    <style>
      .logo-wordmark { font-family: 'Playfair Display', Georgia, 'Times New Roman', serif; }
      .logo-sub      { font-family: 'Inter', 'Helvetica Neue', Arial, sans-serif; }
    </style>
  </defs>

  <!-- ── Mark: Portfolio structure icon ──
       Three stacked rows of blocks — left column full, middle partial, right single.
       Represents a structured, tiered portfolio hierarchy. -->

  <!-- Row 1 -->
  <rect x="0"  y="4"  width="14" height="14" rx="2" fill="#c9933a"/>
  <rect x="18" y="4"  width="14" height="14" rx="2" fill="#c9933a" opacity="0.55"/>
  <rect x="36" y="4"  width="14" height="14" rx="2" fill="#c9933a" opacity="0.25"/>

  <!-- Row 2 -->
  <rect x="0"  y="22" width="14" height="14" rx="2" fill="#c9933a" opacity="0.7"/>
  <rect x="18" y="22" width="14" height="14" rx="2" fill="#c9933a" opacity="0.35"/>

  <!-- Row 3 -->
  <rect x="0"  y="40" width="14" height="14" rx="2" fill="#c9933a" opacity="0.4"/>

  <!-- Separator line -->
  <line x1="66" y1="8" x2="66" y2="54" stroke="#c9933a" stroke-width="1" opacity="0.4"/>

  <!-- ── Wordmark ── -->
  <!-- Dark variant (for light backgrounds) — use class switching in showcase -->
  <text x="78" y="36" class="logo-wordmark"
        font-size="22" font-weight="700" letter-spacing="-0.5"
        fill="#0f1117">MANISH MADAN</text>

  <!-- Tagline -->
  <text x="79" y="52" class="logo-sub"
        font-size="9.5" font-weight="500" letter-spacing="2.2"
        fill="#9a968e" text-anchor="start">PORTFOLIO &amp; PMO LEADERSHIP</text>
</svg>
